<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>setlog</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--surface:#161616;--s2:#1e1e1e;--border:#2c2c2c;
  --accent:#d4a96a;--accent2:#e8c99a;--text:#f0ece4;--text2:#706c68;
  --danger:#e05c5c;--green:#5ce08a;--blue:#6ab4d4;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .3s;overflow-y:auto;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(16px);}

/* shared */
.logo{font-family:'Playfair Display',serif;font-size:26px;letter-spacing:3px;color:var(--accent);}
.logo-sub{font-size:11px;letter-spacing:2px;color:var(--text2);margin-top:4px;text-transform:uppercase;}
.sec-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}
.btn-primary{width:100%;background:var(--accent);color:#0c0c0c;border:none;border-radius:var(--r);padding:17px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-primary:disabled{background:var(--border);color:var(--text2);cursor:not-allowed;transform:none;}
.btn-ghost{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.back-btn{background:var(--surface);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.back-btn:hover{background:var(--s2);}
.toggle{width:42px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .3s;}
.toggle.on::after{left:21px;}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px rgba(212,169,106,.15);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ══ HOME ══ */
#homeScreen{background:var(--bg);justify-content:center;align-items:center;}
.home-inner{width:100%;max-width:360px;padding:40px 28px;}
.home-header{margin-bottom:48px;}
.mode-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:16px;}
.mode-card:hover{border-color:var(--accent);}
.mode-card.active{border-color:var(--accent);background:rgba(212,169,106,.08);}
.mode-icon{font-size:28px;flex-shrink:0;}
.mode-text h3{font-size:15px;font-weight:400;margin-bottom:4px;}
.mode-text p{font-size:12px;color:var(--text2);line-height:1.5;}

/* ══ RECORD ══ */
#recordScreen{background:#000;overflow:hidden;}
#bgCam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.12;}
.rec-top{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:52px 20px 16px;flex-shrink:0;}
.rec-title{text-align:center;}
.rec-title-main{font-family:'Playfair Display',serif;font-size:16px;color:var(--accent);}
.rec-title-sub{font-size:11px;color:var(--text2);letter-spacing:1px;margin-top:2px;}
.flip-btn{background:rgba(255,255,255,.08);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;}

.live-wrap{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px;}
.live-box{position:relative;border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6);background:#111;}
#liveVideo{display:block;width:100%;height:100%;object-fit:cover;}
.cd-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity .2s;}
.cd-overlay.show{opacity:1;pointer-events:all;}
.cd-num{font-family:'Playfair Display',serif;font-size:90px;color:#fff;line-height:1;animation:cdpop .7s ease-out;}
@keyframes cdpop{0%{transform:scale(1.5);opacity:0}40%{opacity:1}100%{transform:scale(1);opacity:1}}
.rec-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1);}
.rec-bar{height:100%;background:var(--danger);width:0%;}
.rec-badge{position:absolute;top:10px;left:10px;display:none;align-items:center;gap:5px;background:rgba(0,0,0,.55);border-radius:20px;padding:4px 10px 4px 7px;font-size:11px;}
.rdb{width:7px;height:7px;background:var(--danger);border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* clip counter */
.clip-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--accent);letter-spacing:.5px;}

.rec-bottom{position:relative;z-index:10;padding:12px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0;}
.dur-row{display:flex;align-items:center;gap:12px;width:100%;max-width:260px;}
.dur-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent);min-width:44px;text-align:center;line-height:1;}
.dur-val span{font-size:11px;color:var(--text2);font-family:'DM Sans',sans-serif;}
.rec-btn{width:68px;height:68px;border-radius:50%;background:transparent;border:3px solid rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.rec-btn:disabled{opacity:.3;cursor:not-allowed;}
.rec-btn-inner{width:50px;height:50px;border-radius:50%;background:var(--danger);transition:all .3s;}
.rec-btn.recording .rec-btn-inner{border-radius:8px;width:26px;height:26px;}
.rec-hint{font-size:11px;color:var(--text2);letter-spacing:.5px;min-height:16px;text-align:center;}

/* saved clips strip */
.clips-strip-wrap{width:100%;max-width:320px;}
.clips-strip-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;text-align:center;}
.clips-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
.clips-strip::-webkit-scrollbar{height:2px;}
.clip-thumb{width:36px;height:54px;border-radius:4px;background:var(--s2);overflow:hidden;flex-shrink:0;position:relative;border:1px solid var(--border);}
.clip-thumb video{width:100%;height:100%;object-fit:cover;}
.clip-thumb .cdel{position:absolute;inset:0;background:rgba(200,60,60,.7);display:none;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.clip-thumb:hover .cdel{display:flex;}

/* ══ MERGE ══ */
#mergeScreen{background:var(--bg);}
.merge-header{padding:52px 24px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.merge-header h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);}
.merge-body{padding:0 24px 40px;flex:1;}

/* person lanes */
.lanes{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.lane{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.lane-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.lane-name-input{background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;outline:none;flex:1;min-width:0;}
.lane-name-input::placeholder{color:var(--text2);}
.lane-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:8px;}
.lane-add-btn{background:var(--s2);border:1px dashed var(--border);border-radius:6px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 10px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.lane-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.lane-clips{display:flex;gap:6px;padding:0 14px 12px;overflow-x:auto;min-height:64px;align-items:center;}
.lane-clips::-webkit-scrollbar{height:2px;}
.lane-clip{width:40px;height:60px;border-radius:5px;overflow:hidden;flex-shrink:0;position:relative;background:var(--s2);border:1px solid var(--border);cursor:grab;}
.lane-clip video{width:100%;height:100%;object-fit:cover;pointer-events:none;}
.lane-clip .clip-del{position:absolute;inset:0;background:rgba(200,60,60,.75);display:none;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.lane-clip:hover .clip-del{display:flex;}
.lane-clip.dragging{opacity:.4;}
.lane-empty{font-size:11px;color:var(--text2);letter-spacing:.5px;}

/* timeline preview */
.timeline-wrap{margin-bottom:20px;}
.tl-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px;position:relative;}
.tl-seg{position:absolute;top:0;height:100%;border-radius:2px;opacity:.8;}
.tl-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);}

/* ratio */
.ratio-row{display:flex;gap:8px;margin-bottom:24px;}
.ratio-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 4px;cursor:pointer;color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;text-align:center;transition:all .2s;}
.ratio-btn:hover{border-color:var(--accent);}
.ratio-btn.active{border-color:var(--accent);background:rgba(212,169,106,.09);color:var(--accent);}

/* overlay options */
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.opt-label{font-size:13px;}
.text-sub{margin-top:8px;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.text-sub input,.text-sub select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;outline:none;width:100%;transition:border-color .2s;}
.text-sub input:focus,.text-sub select:focus{border-color:var(--accent);}
.text-sub select option{background:#1e1e1e;}
.div-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.div-row label{font-size:13px;flex:1;}
#divColor{width:40px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--s2);cursor:pointer;padding:2px;}

/* canvas */
.canvas-wrap{display:flex;justify-content:center;margin-bottom:20px;}
#mergeCanvas{max-width:100%;max-height:44vh;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.5);}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:300px;text-align:center;}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);margin-bottom:6px;}
.modal p{color:var(--text2);font-size:12px;margin-bottom:22px;}
.prog-bg{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .2s;width:0%;}
.prog-txt{font-size:11px;color:var(--text2);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px;}

.cam-error{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;padding:40px;text-align:center;}
.cam-error.show{display:flex;}
.cam-error h3{font-family:'Playfair Display',serif;color:var(--danger);font-size:18px;}
.cam-error p{color:var(--text2);font-size:13px;line-height:1.6;}
.cam-error button{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:9999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen" id="homeScreen">
  <div class="home-inner">
    <div class="home-header">
      <div class="logo">setlog</div>
      <div class="logo-sub">split vlog maker</div>
    </div>
    <div class="mode-cards">
      <div class="mode-card active" id="modeRecCard" onclick="selectMode('rec')">
        <div class="mode-icon">📱</div>
        <div class="mode-text">
          <h3>내 영상 녹화</h3>
          <p>찍을 때마다 자동 저장돼요<br>하루치 다 찍고 합치기에서 써요</p>
        </div>
      </div>
      <div class="mode-card" id="modeMergeCard" onclick="selectMode('merge')">
        <div class="mode-icon">🎬</div>
        <div class="mode-text">
          <h3>영상 합치기</h3>
          <p>3명의 클립을 각 레인에 올리면<br>순서대로 3분할 영상으로 합쳐요</p>
        </div>
      </div>
    </div>
    <button class="btn-primary" onclick="goFromHome()">시작하기</button>
  </div>
</div>

<!-- ══ RECORD ══ -->
<div class="screen hidden" id="recordScreen">
  <video id="bgCam" autoplay muted playsinline></video>
  <div class="rec-top">
    <button class="back-btn" onclick="goHome()" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1);">‹</button>
    <div class="rec-title">
      <div class="rec-title-main">녹화</div>
      <div class="rec-title-sub">찍을 때마다 자동 저장</div>
    </div>
    <button class="flip-btn" onclick="flipCam()">⇄</button>
  </div>
  <div class="live-wrap">
    <div class="live-box" id="liveBox">
      <video id="liveVideo" autoplay muted playsinline></video>
      <div class="cd-overlay" id="cdOverlay"><div class="cd-num" id="cdNum">3</div></div>
      <div class="rec-bar-wrap"><div class="rec-bar" id="recBar"></div></div>
      <div class="rec-badge" id="recBadge"><div class="rdb"></div>REC</div>
      <div class="clip-counter" id="clipCounter" style="display:none"></div>
    </div>
  </div>
  <div class="rec-bottom">
    <div class="dur-row">
      <div class="dur-val" id="durVal">5<span>초</span></div>
      <input type="range" id="durSlider" min="1" max="30" value="5" oninput="updateDur()">
    </div>
    <button class="rec-btn" id="recBtn" onclick="startRec()">
      <div class="rec-btn-inner"></div>
    </button>
    <div class="rec-hint" id="recHint">버튼을 누르면 3초 후 자동 녹화</div>
    <div class="clips-strip-wrap" id="clipsStripWrap" style="display:none">
      <div class="clips-strip-label">저장된 클립</div>
      <div class="clips-strip" id="clipsStrip"></div>
    </div>
  </div>
</div>

<!-- ══ MERGE ══ -->
<div class="screen hidden" id="mergeScreen">
  <div class="merge-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h2>영상 합치기</h2>
  </div>
  <div class="merge-body">

    <div style="margin-bottom:20px;">
      <div class="sec-label">비율</div>
      <div class="ratio-row">
        <button class="ratio-btn active" data-r="9:16" onclick="pickRatio('9:16')">9:16</button>
        <button class="ratio-btn" data-r="1:1" onclick="pickRatio('1:1')">1:1</button>
        <button class="ratio-btn" data-r="4:5" onclick="pickRatio('4:5')">4:5</button>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <div class="sec-label">각자 클립 올리기</div>
      <div class="lanes" id="lanesWrap"></div>
    </div>

    <div style="margin-bottom:20px;">
      <div class="sec-label">타임라인 미리보기</div>
      <div class="timeline-wrap" id="timelineWrap"></div>
    </div>

    <div style="margin-bottom:20px;">
      <div class="sec-label">오버레이</div>
      <div class="div-row">
        <label>구분선 색상</label>
        <input type="color" id="divColor" value="#ffffff" oninput="renderCanvas()">
      </div>
      <div class="opt-row">
        <span class="opt-label">날짜 표시</span>
        <div class="toggle on" id="dateToggle" onclick="this.classList.toggle('on');renderCanvas();"></div>
      </div>
      <div class="opt-row">
        <span class="opt-label">커스텀 텍스트</span>
        <div class="toggle" id="txtToggle" onclick="toggleTxt()"></div>
      </div>
      <div class="text-sub" id="txtSub" style="display:none">
        <input type="text" id="customTxt" placeholder="텍스트 입력..." maxlength="40" oninput="renderCanvas()">
        <select id="txtPos" onchange="renderCanvas()">
          <option value="bl">왼쪽 하단</option>
          <option value="br">오른쪽 하단</option>
          <option value="tl">왼쪽 상단</option>
          <option value="c">가운데</option>
        </select>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="mergeCanvas"></canvas>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;padding-bottom:20px;">
      <button class="btn-primary" id="exportBtn" onclick="doExport()">영상 저장하기</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="spinner"></div>
    <h3 id="mTitle">처리 중</h3>
    <p id="mDesc">잠시만 기다려 주세요</p>
    <div class="prog-bg"><div class="prog-fill" id="mFill"></div></div>
    <div class="prog-txt" id="mTxt">0%</div>
  </div>
</div>

<div class="cam-error" id="camError">
  <h3>카메라 접근 불가</h3>
  <p>브라우저에서 카메라 권한을 허용해 주세요.<br>주소창 옆 자물쇠 → 권한 허용</p>
  <button onclick="document.getElementById('camError').classList.remove('show')">닫기</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="laneFileInput" accept="video/*" multiple>

<script>
// ══════════════════════════
//  STATE
// ══════════════════════════
let selectedMode = 'rec';

// Record
const R = {
  stream:null, facing:'user', mr:null, isRec:false,
  cdTimer:null, recTimer:null, duration:5,
  clips:[], // [{blob, url, thumbVid}]
};

// Merge
const M = {
  ratio:'9:16', animFrame:null,
  pendingLane:null,
  lanes:[
    {name:'나', color:'#d4a96a',    clips:[]},
    {name:'친구1', color:'#6ab4d4', clips:[]},
    {name:'친구2', color:'#5ce08a', clips:[]},
  ],
  // clips: [{file, url, videoEl, duration}]
};

const LANE_COLORS = ['#d4a96a','#6ab4d4','#5ce08a','#c96ad4'];

// ══════════════════════════
//  HOME
// ══════════════════════════
function selectMode(m){
  selectedMode=m;
  document.getElementById('modeRecCard').classList.toggle('active',m==='rec');
  document.getElementById('modeMergeCard').classList.toggle('active',m==='merge');
}
function goFromHome(){
  if(selectedMode==='rec') goRecord();
  else goMerge();
}
function goHome(){
  stopRec();
  if(R.stream){R.stream.getTracks().forEach(t=>t.stop());R.stream=null;}
  if(M.animFrame) cancelAnimationFrame(M.animFrame);
  showScreen('homeScreen');
}

// ══════════════════════════
//  RECORD
// ══════════════════════════
async function goRecord(){
  showScreen('recordScreen');
  sizeLiveBox();
  renderClipsStrip();
  await startCam();
}
function sizeLiveBox(){
  const box=document.getElementById('liveBox');
  const maxW=Math.min(window.innerWidth-40,260), maxH=window.innerHeight*0.45;
  const asp=9/16; let w=maxW,h=w/asp;
  if(h>maxH){h=maxH;w=h*asp;}
  box.style.width=Math.round(w)+'px'; box.style.height=Math.round(h)+'px';
}
async function startCam(){
  try{
    if(R.stream) R.stream.getTracks().forEach(t=>t.stop());
    R.stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:R.facing,width:{ideal:1280},height:{ideal:720}},audio:true
    });
    document.getElementById('liveVideo').srcObject=R.stream;
    document.getElementById('bgCam').srcObject=R.stream;
    document.getElementById('liveVideo').style.transform=`scaleX(${R.facing==='user'?-1:1})`;
  }catch(e){ document.getElementById('camError').classList.add('show'); }
}
async function flipCam(){ R.facing=R.facing==='user'?'environment':'user'; await startCam(); }
function updateDur(){
  R.duration=+document.getElementById('durSlider').value;
  document.getElementById('durVal').innerHTML=`${R.duration}<span>초</span>`;
}
function startRec(){
  if(R.isRec) return;
  document.getElementById('recBtn').disabled=true;
  document.getElementById('recHint').textContent='';
  runCD(3,()=>doRec());
}
function runCD(n,cb){
  const ov=document.getElementById('cdOverlay'),num=document.getElementById('cdNum');
  ov.classList.add('show'); num.textContent=n;
  num.style.animation='none'; void num.offsetWidth; num.style.animation='';
  if(n>0) R.cdTimer=setTimeout(()=>runCD(n-1,cb),1000);
  else{ ov.classList.remove('show'); cb(); }
}
function doRec(){
  if(!R.stream) return;
  R.isRec=true;
  const btn=document.getElementById('recBtn');
  btn.classList.add('recording'); btn.disabled=false;
  document.getElementById('recBadge').style.display='flex';
  const bar=document.getElementById('recBar');
  bar.style.transition='none'; bar.style.width='0%';
  void bar.offsetWidth;
  bar.style.transition=`width ${R.duration}s linear`;
  requestAnimationFrame(()=>bar.style.width='100%');
  const mime=getBestMime();
  R.mr=new MediaRecorder(R.stream,{mimeType:mime});
  const chunks=[];
  R.mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  R.mr.onstop=()=>{
    const blob=new Blob(chunks,{type:mime});
    saveClip(blob,mime);
  };
  R.mr.start(100);
  R.recTimer=setTimeout(()=>{ if(R.mr&&R.mr.state!=='inactive') R.mr.stop(); },R.duration*1000);
}
function saveClip(blob,mime){
  R.isRec=false;
  const btn=document.getElementById('recBtn');
  btn.classList.remove('recording'); btn.disabled=false;
  document.getElementById('recBadge').style.display='none';
  document.getElementById('recBar').style.transition='none';
  document.getElementById('recBar').style.width='0%';

  // auto download
  const ext=mime.includes('mp4')?'mp4':'webm';
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`setlog_${Date.now()}.${ext}`; a.click();

  // keep thumb in strip
  const thumbVid=document.createElement('video');
  thumbVid.src=url; thumbVid.muted=true; thumbVid.loop=true; thumbVid.playsInline=true;
  thumbVid.addEventListener('loadeddata',()=>thumbVid.play(),{once:true});
  thumbVid.load();
  R.clips.push({blob,url,thumbVid,mime});

  renderClipsStrip();
  updateClipCounter();
  document.getElementById('recHint').textContent=`✓ 클립 ${R.clips.length}개 저장됨`;
  setTimeout(()=>{
    if(!R.isRec) document.getElementById('recHint').textContent='버튼을 누르면 3초 후 자동 녹화';
  },2000);
}
function renderClipsStrip(){
  const strip=document.getElementById('clipsStrip');
  const wrap=document.getElementById('clipsStripWrap');
  if(R.clips.length===0){wrap.style.display='none';return;}
  wrap.style.display='block';
  strip.innerHTML='';
  R.clips.forEach((c,i)=>{
    const div=document.createElement('div'); div.className='clip-thumb';
    const v=document.createElement('video');
    v.src=c.url; v.muted=true; v.loop=true; v.autoplay=true; v.playsInline=true;
    v.style.cssText='width:100%;height:100%;object-fit:cover;';
    const del=document.createElement('div'); del.className='cdel'; del.textContent='✕';
    del.onclick=()=>{ R.clips.splice(i,1); renderClipsStrip(); updateClipCounter(); };
    div.appendChild(v); div.appendChild(del);
    strip.appendChild(div);
  });
}
function updateClipCounter(){
  const el=document.getElementById('clipCounter');
  if(R.clips.length>0){el.style.display='block';el.textContent=`📎 ${R.clips.length}클립`;}
  else el.style.display='none';
}
function stopRec(){
  clearTimeout(R.cdTimer); clearTimeout(R.recTimer);
  if(R.mr&&R.mr.state!=='inactive') R.mr.stop();
  R.isRec=false;
}
function getBestMime(){
  const t=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  return t.find(x=>MediaRecorder.isTypeSupported(x))||'video/webm';
}

// ── Lanes ──
function buildLanes(){
  const wrap=document.getElementById('lanesWrap'); wrap.innerHTML='';
  M.lanes.forEach((lane,li)=>{
    const laneEl=document.createElement('div'); laneEl.className='lane'; laneEl.id=`lane-${li}`;
    // header
    const hdr=document.createElement('div'); hdr.className='lane-header';
    const dot=document.createElement('div');
    dot.className='lane-color-dot'; dot.style.background=lane.color;
    const nameInp=document.createElement('input');
    nameInp.className='lane-name-input'; nameInp.value=lane.name;
    nameInp.placeholder=`사람 ${li+1}`;
    nameInp.oninput=e=>{ lane.name=e.target.value; };
    const addBtn=document.createElement('button'); addBtn.className='lane-add-btn';
    addBtn.textContent='+ 클립 추가'; addBtn.onclick=()=>openLanePicker(li);
    hdr.appendChild(dot); hdr.appendChild(nameInp); hdr.appendChild(addBtn);
    // clips
    const clipsEl=document.createElement('div'); clipsEl.className='lane-clips'; clipsEl.id=`lane-clips-${li}`;
    if(lane.clips.length===0){
      const em=document.createElement('div'); em.className='lane-empty'; em.textContent='클립 없음';
      clipsEl.appendChild(em);
    } else {
      lane.clips.forEach((c,ci)=>{
        const cd=document.createElement('div'); cd.className='lane-clip';
        const v=document.createElement('video');
        v.src=c.url; v.muted=true; v.loop=true; v.autoplay=true; v.playsInline=true;
        const del=document.createElement('div'); del.className='clip-del'; del.textContent='✕';
        del.onclick=e=>{ e.stopPropagation(); removeLaneClip(li,ci); };
        cd.appendChild(v); cd.appendChild(del); clipsEl.appendChild(cd);
      });
    }
    laneEl.appendChild(hdr); laneEl.appendChild(clipsEl);
    wrap.appendChild(laneEl);
  });
  buildTimeline();
}

function openLanePicker(li){
  M.pendingLane=li;
  const inp=document.getElementById('laneFileInput');
  inp.multiple=true; inp.click();
}

document.getElementById('laneFileInput').addEventListener('change',async function(e){
  if(M.pendingLane===null) return;
  const li=M.pendingLane; const files=[...e.target.files];
  for(const file of files){
    const url=URL.createObjectURL(file);
    const vid=document.createElement('video');
    vid.src=url; vid.muted=true; vid.loop=true; vid.playsInline=true;
    await new Promise(res=>{vid.addEventListener('loadedmetadata',res,{once:true});vid.load();});
    vid.play();
    M.lanes[li].clips.push({file,url,videoEl:vid,duration:vid.duration||5});
  }
  this.value=''; M.pendingLane=null;
  buildLanes(); renderCanvas();
});

function removeLaneClip(li,ci){
  URL.revokeObjectURL(M.lanes[li].clips[ci].url);
  M.lanes[li].clips.splice(ci,1);
  buildLanes(); renderCanvas();
}

// ── Timeline ──
function buildTimeline(){
  const wrap=document.getElementById('timelineWrap'); wrap.innerHTML='';
  // total duration per lane
  const totals=M.lanes.map(l=>l.clips.reduce((s,c)=>s+(c.duration||5),0));
  const maxTotal=Math.max(...totals,1);
  M.lanes.forEach((lane,li)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;';
    const lbl=document.createElement('div');
    lbl.style.cssText=`font-size:10px;color:var(--text2);width:40px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`;
    lbl.textContent=lane.name||`사람${li+1}`;
    const bar=document.createElement('div'); bar.className='tl-bar'; bar.style.flex='1';
    let offset=0;
    lane.clips.forEach(c=>{
      const seg=document.createElement('div'); seg.className='tl-seg';
      const w=(c.duration||5)/maxTotal*100;
      seg.style.cssText=`left:${offset/maxTotal*100}%;width:${w}%;background:${lane.color};`;
      bar.appendChild(seg); offset+=c.duration||5;
    });
    const dur=document.createElement('div');
    dur.style.cssText='font-size:10px;color:var(--text2);width:32px;text-align:right;flex-shrink:0;';
    dur.textContent=totals[li].toFixed(1)+'s';
    row.appendChild(lbl); row.appendChild(bar); row.appendChild(dur);
    wrap.appendChild(row);
  });
}

// ── Canvas ──
function getCanvasSize(){
  const [w,h]=M.ratio.split(':').map(Number),BASE=480;
  return w>h?{W:BASE,H:Math.round(BASE*h/w)}:{W:Math.round(BASE*w/h),H:BASE};
}
function getCellRects(W,H,gap=2){
  // Always 3 vertical splits for 3 people
  const hw=Math.floor((W-gap*2)/3);
  return [
    {x:0,y:0,w:hw,h:H},
    {x:hw+gap,y:0,w:hw,h:H},
    {x:(hw+gap)*2,y:0,w:W-(hw+gap)*2,h:H}
  ];
}

// playback state
let playheads=[0,0,0]; // current clip index per lane
let playTimes=[0,0,0];  // current time within clip

function renderCanvas(){
  const canvas=document.getElementById('mergeCanvas');
  const ctx=canvas.getContext('2d');
  const {W,H}=getCanvasSize();
  canvas.width=W; canvas.height=H;
  const divColor=document.getElementById('divColor').value;
  const rects=getCellRects(W,H,2);
  ctx.fillStyle=divColor; ctx.fillRect(0,0,W,H);

  rects.forEach((r,i)=>{
    ctx.save(); ctx.beginPath(); ctx.rect(r.x,r.y,r.w,r.h); ctx.clip();
    const lane=M.lanes[i];
    // find currently playing clip for this lane
    let vid=null;
    if(lane&&lane.clips.length>0){
      // use first available loaded clip for preview
      for(const c of lane.clips){
        if(c.videoEl&&c.videoEl.readyState>=2){vid=c.videoEl;break;}
      }
    }
    if(vid){
      const vw=vid.videoWidth,vh=vid.videoHeight;
      const sc=Math.max(r.w/vw,r.h/vh);
      ctx.drawImage(vid,r.x+(r.w-vw*sc)/2,r.y+(r.h-vh*sc)/2,vw*sc,vh*sc);
    } else {
      ctx.fillStyle='#1a1a1a'; ctx.fillRect(r.x,r.y,r.w,r.h);
      const color=lane?lane.color:'#333';
      ctx.fillStyle=color+'44'; ctx.fillRect(r.x,r.y,r.w,r.h);
      ctx.fillStyle=color;
      ctx.font=`300 ${Math.min(r.w,r.h)*.09}px DM Sans`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lane?(lane.name||`사람${i+1}`):`사람${i+1}`,r.x+r.w/2,r.y+r.h/2);
    }
    ctx.restore();
  });
  drawOverlays(ctx,W,H);
  if(M.animFrame) cancelAnimationFrame(M.animFrame);
  const hasAny=M.lanes.some(l=>l.clips.length>0);
  if(hasAny) M.animFrame=requestAnimationFrame(renderCanvas);
}

function drawOverlays(ctx,W,H){
  const pad=12;
  if(document.getElementById('dateToggle').classList.contains('on')){
    const now=new Date();
    const str=now.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})
              +'  '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const fs=Math.round(W*.028);
    ctx.save(); ctx.font=`300 ${fs}px 'DM Sans',sans-serif`;
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillText(str,W-pad+1,H-pad+1);
    ctx.fillStyle='rgba(255,255,255,.88)'; ctx.fillText(str,W-pad,H-pad);
    ctx.restore();
  }
  if(document.getElementById('txtToggle').classList.contains('on')){
    const txt=document.getElementById('customTxt').value; if(!txt)return;
    const pos=document.getElementById('txtPos').value;
    const fs=Math.round(W*.042);
    ctx.save(); ctx.font=`300 ${fs}px 'Playfair Display',serif`;
    let x,y,align,baseline;
    if(pos==='bl'){x=pad;y=H-pad;align='left';baseline='bottom';}
    else if(pos==='br'){x=W-pad;y=H-pad;align='right';baseline='bottom';}
    else if(pos==='tl'){x=pad;y=pad;align='left';baseline='top';}
    else{x=W/2;y=H/2;align='center';baseline='middle';}
    ctx.textAlign=align; ctx.textBaseline=baseline;
    ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillText(txt,x+1,y+1);
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fillText(txt,x,y);
    ctx.restore();
  }
}

// ── Export: stitch clips sequentially per lane, all lanes side by side ──
async function doExport(){
  const hasAny=M.lanes.some(l=>l.clips.length>0);
  if(!hasAny){showToast('클립을 먼저 추가해 주세요!');return;}
  if(!window.MediaRecorder){alert('Chrome 브라우저를 사용해 주세요.');return;}

  document.getElementById('exportBtn').disabled=true;
  showModal('영상 합치는 중','3분할 영상을 완성하고 있어요...');

  // Figure out max total duration
  const totals=M.lanes.map(l=>l.clips.reduce((s,c)=>s+(c.duration||5),0));
  const maxDur=Math.max(...totals,1);

  // Prepare all videos loaded
  for(const lane of M.lanes){
    for(const c of lane.clips){
      if(c.videoEl.readyState<1){
        await new Promise(res=>{c.videoEl.addEventListener('loadedmetadata',res,{once:true});c.videoEl.load();});
      }
    }
  }

  const canvas=document.getElementById('mergeCanvas');
  const {W,H}=getCanvasSize();
  canvas.width=W; canvas.height=H;

  const stream=canvas.captureStream(30);

  // Audio mix
  try{
    const actx=new(window.AudioContext||window.webkitAudioContext)();
    const dest=actx.createMediaStreamDestination();
    for(const lane of M.lanes){
      for(const c of lane.clips){
        try{actx.createMediaElementSource(c.videoEl).connect(dest);}catch(e){}
      }
    }
    dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));
  }catch(e){}

  const mime=getBestMime();
  const mr=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8_000_000});
  const chunks=[]; mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  mr.start(100);

  // Animate canvas sequentially per lane
  const startT=performance.now();
  const divColor=document.getElementById('divColor').value;
  const rects=getCellRects(W,H,2);

  // Per-lane playback state
  const laneState=M.lanes.map(lane=>({
    clips:lane.clips, clipIdx:0, elapsed:0,
    color:lane.color, name:lane.name,
  }));

  // Start first clip per lane
  laneState.forEach(ls=>{
    if(ls.clips.length>0){ls.clips[0].videoEl.currentTime=0;ls.clips[0].videoEl.play();}
  });

  function drawFrame(elapsed){
    const ctx=canvas.getContext('2d');
    ctx.fillStyle=divColor; ctx.fillRect(0,0,W,H);

    rects.forEach((r,i)=>{
      ctx.save(); ctx.beginPath(); ctx.rect(r.x,r.y,r.w,r.h); ctx.clip();
      const ls=laneState[i];
      if(!ls){ctx.fillStyle='#111';ctx.fillRect(r.x,r.y,r.w,r.h);ctx.restore();return;}

      // advance clip if needed
      const curClip=ls.clips[ls.clipIdx];
      if(curClip){
        const clipElapsed=elapsed-ls.elapsed;
        if(clipElapsed>=(curClip.duration||5)&&ls.clipIdx<ls.clips.length-1){
          curClip.videoEl.pause();
          ls.elapsed+=curClip.duration||5;
          ls.clipIdx++;
          const next=ls.clips[ls.clipIdx];
          next.videoEl.currentTime=0; next.videoEl.play();
        }
        const vid=ls.clips[ls.clipIdx].videoEl;
        if(vid.readyState>=2){
          const vw=vid.videoWidth,vh=vid.videoHeight;
          const sc=Math.max(r.w/vw,r.h/vh);
          ctx.drawImage(vid,r.x+(r.w-vw*sc)/2,r.y+(r.h-vh*sc)/2,vw*sc,vh*sc);
        } else {
          ctx.fillStyle='#1a1a1a';ctx.fillRect(r.x,r.y,r.w,r.h);
        }
      } else {
        ctx.fillStyle='#111';ctx.fillRect(r.x,r.y,r.w,r.h);
      }
      ctx.restore();
    });
    drawOverlays(ctx,W,H);
  }

  // render loop
  let lastT=performance.now();
  await new Promise(resolve=>{
    function loop(){
      const now=performance.now();
      const elapsed=(now-startT)/1000;
      drawFrame(elapsed);
      const p=Math.min(100,Math.round(elapsed/maxDur*100));
      document.getElementById('mFill').style.width=p+'%';
      document.getElementById('mTxt').textContent=p+'%';
      if(elapsed<maxDur) requestAnimationFrame(loop);
      else resolve();
    }
    requestAnimationFrame(loop);
  });

  mr.stop();
  await new Promise(res=>mr.onstop=res);

  const blob=new Blob(chunks,{type:mime});
  const ext=mime.includes('mp4')?'mp4':'webm';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`setlog_${Date.now()}.${ext}`; a.click();

  hideModal();
  document.getElementById('exportBtn').disabled=false;
  showToast('🎬 완성됐어요!');

  // restore preview
  renderCanvas();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id));}
function showModal(t,d){
  document.getElementById('mTitle').textContent=t;
  document.getElementById('mDesc').textContent=d;
  document.getElementById('mFill').style.width='0%';
  document.getElementById('mTxt').textContent='0%';
  document.getElementById('modalBg').classList.add('show');
}
function hideModal(){document.getElementById('modalBg').classList.remove('show');}
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}
